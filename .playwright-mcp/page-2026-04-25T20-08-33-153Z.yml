        - generic [ref=e148]: Phase 1 · Days 1–18
        - heading "Awakening" [level=3] [ref=e149]
        - paragraph [ref=e150]: The practice begins here. Before anything can change, you have to see where you actually are — clearly, without softening it. Day one is an arrival, not a transformation.
      - generic [ref=e155]:
        - generic [ref=e157]: Phase 2 · Days 19–36
        - heading "Excavation" [level=3] [ref=e158]
        - paragraph [ref=e159]: You start digging. The prompts go deeper — into the stories you inherited, the defenses you built, the versions of yourself you perform without realising it.
      - generic [ref=e164]:
        - generic [ref=e166]: Phase 3 · Days 37–54
        - heading "The Turn" [level=3] [ref=e167]
        - paragraph [ref=e168]: The hardest phase. Everything shifts here — not because circumstances change, but because you choose a different lens. Reframe days begin. Old stories get examined.
      - generic [ref=e173]:
        - generic [ref=e175]: Phase 4 · Days 55–72
        - heading "Pattern Work" [level=3] [ref=e176]
        - paragraph [ref=e177]: You stop reacting and start watching. Patterns you couldn't see day to day become visible. Your mood map and AI insights start to show you the shape of your own mind.
      - generic [ref=e181]:
        - generic [ref=e183]: Phase 5 · Days 73–90
        - heading "Rising" [level=3] [ref=e184]
        - paragraph [ref=e185]: The practice becomes the life. You don't journal to feel better anymore — you journal because you know yourself now. Day 90 is not an ending. It's the first day you don't need to be told who you are.
